<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none';
               script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com;
               style-src 'self' 'unsafe-inline';
               img-src 'self' data: https://*.googleusercontent.com;
               font-src 'self';
               connect-src https://api.openai.com https://generativelanguage.googleapis.com https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://leanfit-662cc.firebaseapp.com;
               frame-src https://leanfit-662cc.firebaseapp.com https://accounts.google.com https://apis.google.com;
               object-src 'none';
               base-uri 'none';
               form-action 'none';
               frame-ancestors 'none'" />
<meta name="referrer" content="no-referrer" />
<title>FitForge — Fitness Tracker</title>
<style>
  :root{
    --bg:#0d1117; --bg-2:#131a24; --card:#19212e; --card-2:#1f2937;
    --line:#2a3444; --txt:#e6edf3; --muted:#9aa7b8;
    --accent:#22d3a8; --accent-2:#38bdf8; --warm:#fbbf24; --danger:#f87171;
    --radius:16px; --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%,#16313a 0%,transparent 60%),
               radial-gradient(900px 500px at -10% 10%,#1d2440 0%,transparent 55%),var(--bg);
    color:var(--txt);line-height:1.55;min-height:100vh;
    -webkit-text-size-adjust:100%;text-size-adjust:100%;
  }
  a{color:var(--accent-2);text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:0 18px}

  /* sticky top nav */
  .topbar{position:sticky;top:0;z-index:40;padding:0;text-align:left;background:#0d1117;border-bottom:1px solid var(--line)}
  .topbar-inner{display:flex;align-items:center;gap:12px;padding:10px 18px}
  .brand{font-weight:800;font-size:19px;white-space:nowrap;letter-spacing:-.5px}
  .brand span{background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .nav{display:flex;gap:6px;margin-left:auto;overflow-x:auto;scrollbar-width:none}
  .nav::-webkit-scrollbar{display:none}
  .nav button{cursor:pointer;background:transparent;border:1px solid transparent;color:var(--muted);
    font-weight:600;font-size:14px;padding:8px 13px;border-radius:10px;white-space:nowrap;transition:.15s}
  .nav button:hover{color:var(--txt)}
  .nav button.active{background:var(--card);border-color:var(--line);color:var(--txt)}
  .daypills{display:flex;gap:8px;overflow-x:auto;padding:18px 0 12px;scrollbar-width:none}
  .daypills::-webkit-scrollbar{display:none}
  .pill{cursor:pointer;flex:0 0 auto;background:var(--card);border:1px solid var(--line);color:var(--txt);
    border-radius:14px;padding:8px 16px;text-align:center;transition:.15s;white-space:nowrap;min-width:78px}
  .pill small{display:block;color:var(--muted);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px}
  .pill .pname{font-weight:700;font-size:14px;margin-top:2px}
  .pill:hover{border-color:var(--accent-2)}
  .pill.active{background:linear-gradient(135deg,rgba(34,211,168,.20),rgba(56,189,248,.16));border-color:var(--accent);color:#fff}
  .pill.active small{color:var(--accent)}
  @media(max-width:560px){
    .topbar-inner{gap:8px;padding:9px 12px}
    .brand{font-size:15px}
    .nav{gap:4px}
    .nav button{font-size:12px;padding:6px 8px;gap:4px;display:flex;flex-direction:column;align-items:center;line-height:1.1}
    .nav button span{font-size:10px;font-weight:600}
  }

  header{padding:54px 0 30px;text-align:center}
  .badge{display:inline-block;font-size:12px;letter-spacing:2px;text-transform:uppercase;
    color:var(--accent);border:1px solid var(--line);background:var(--card);padding:6px 14px;border-radius:999px;margin-bottom:18px}
  header h1{font-size:clamp(30px,6vw,52px);font-weight:800;letter-spacing:-1px}
  header h1 span{background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
  header p{color:var(--muted);max-width:660px;margin:14px auto 0;font-size:17px}
  .start-pill{display:inline-flex;gap:8px;align-items:center;margin-top:22px;background:var(--card);
    border:1px solid var(--line);border-radius:999px;padding:10px 18px;font-weight:600}
  .start-pill b{color:var(--accent)}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:30px 0}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;text-align:center}
  .stat .n{font-size:26px;font-weight:800;color:var(--accent)}
  .stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}

  .section-title{font-size:24px;font-weight:800;margin:42px 0 6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .section-title small{font-size:13px;font-weight:500;color:var(--muted)}
  .lead{color:var(--muted);margin-bottom:20px;max-width:780px}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
  .pcard h3{font-size:16px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .pcard p{color:var(--muted);font-size:14px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);display:inline-block}

  .tabs{display:flex;flex-wrap:wrap;gap:10px;margin:26px 0 18px}
  .tab{flex:1 1 auto;min-width:110px;cursor:pointer;border:1px solid var(--line);background:var(--card);
    color:var(--txt);padding:14px 12px;border-radius:14px;text-align:center;transition:.18s;font-weight:600}
  .tab small{display:block;color:var(--muted);font-weight:500;font-size:12px;margin-top:3px}
  .tab:hover{border-color:var(--accent-2)}
  .tab.active{background:linear-gradient(135deg,rgba(34,211,168,.18),rgba(56,189,248,.16));border-color:var(--accent);color:#fff}
  .tab.active small{color:var(--accent)}
  .tab.prog.active{background:linear-gradient(135deg,rgba(251,191,36,.20),rgba(56,189,248,.12));border-color:var(--warm)}
  .tab.prog.active small{color:var(--warm)}

  .weekbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:12px 16px;margin-bottom:18px}
  .weekbar .left{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .wk-btn{cursor:pointer;background:var(--card);border:1px solid var(--line);color:var(--txt);
    width:36px;height:36px;border-radius:10px;font-size:18px;font-weight:700}
  .wk-btn:hover{border-color:var(--accent)}
  .wk-label{font-weight:700;font-size:16px;min-width:90px;text-align:center}
  .ghost{background:transparent;border:1px solid var(--line);color:var(--muted);cursor:pointer;
    padding:9px 14px;border-radius:10px;font-size:13px;font-weight:600}
  .ghost:hover{color:var(--danger);border-color:var(--danger)}

  .view{display:none;animation:fade .25s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .day-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px}
  .day-head h2{font-size:22px}
  .focus-tag{font-size:12px;color:var(--accent);background:rgba(34,211,168,.12);border:1px solid var(--line);padding:4px 12px;border-radius:999px}
  .day-sub{color:var(--muted);font-size:14px;margin-bottom:16px}

  /* warm-up block */
  .warmblock{background:linear-gradient(135deg,rgba(251,191,36,.08),rgba(56,189,248,.05));
    border:1px solid var(--line);border-left:4px solid var(--warm);border-radius:var(--radius);padding:16px 18px;margin-bottom:18px}
  .warmblock .wh{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .warmblock h3{font-size:16px;color:var(--warm)}
  .warmblock p.intro{color:var(--muted);font-size:13px;margin:8px 0 12px}
  .drill{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px dashed var(--line)}
  .drill input{width:20px;height:20px;accent-color:var(--warm);cursor:pointer;flex:none}
  .drill .dn{font-size:14px}
  .drill .dd{font-size:12px;color:var(--muted)}
  .drill.done .dn{text-decoration:line-through;color:var(--muted)}

  .ex{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow)}
  .ex-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .ex-name{font-size:17px;font-weight:700}
  .ex-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .chip{font-size:12px;color:var(--muted);background:var(--card-2);border:1px solid var(--line);padding:3px 10px;border-radius:8px}
  .chip b{color:var(--txt)}
  .chip.warm{color:var(--warm)}
  .chip.sug{color:var(--accent-2);border-color:rgba(56,189,248,.4)}

  .phase{display:flex;gap:14px;align-items:flex-start;border:1px solid var(--line);border-left-width:4px;
    border-radius:14px;padding:14px 16px;margin-bottom:18px;background:var(--bg-2)}
  .phase .pi{font-size:24px;line-height:1.1;flex:none}
  .phase h4{font-size:15px;margin-bottom:4px}
  .phase h4 .wk{color:var(--muted);font-weight:500;font-size:13px}
  .phase p{font-size:13px;color:var(--muted)}
  .phase p b{color:var(--txt)}
  .vid{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#fff;
    background:linear-gradient(135deg,#ff4d4d,#e60000);padding:8px 12px;border-radius:10px;white-space:nowrap}
  .vid:hover{opacity:.9}
  .cue{color:var(--muted);font-size:13px;margin-top:10px;border-left:2px solid var(--accent);padding-left:10px}

  .sets{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px}
  .sets table{width:100%;border-collapse:collapse}
  .sets th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);text-align:left;padding:4px 6px;font-weight:600}
  .sets td{padding:4px 6px}
  .sets input[type=number]{width:100%;background:var(--bg-2);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:8px;font-size:14px;text-align:center}
  .sets input[type=number]:focus{outline:none;border-color:var(--accent)}
  .sets td.setno{font-size:13px;width:74px;font-weight:600}
  .sets tr.warmup td.setno{color:var(--warm)}
  .sets tr.work td.setno{color:var(--muted)}
  .sets input[type=checkbox]{width:22px;height:22px;accent-color:var(--accent);cursor:pointer}
  .done-row input[type=number]{opacity:.5}

  .progress-wrap{margin-top:14px}
  .bar{height:8px;border-radius:999px;background:var(--card-2);overflow:hidden}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .3s}
  .progress-label{font-size:12px;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between}

  .note{background:linear-gradient(135deg,rgba(56,189,248,.08),rgba(34,211,168,.06));
    border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-top:14px}
  .note h3{margin-bottom:10px}
  .note ul{margin-left:18px;color:var(--muted);font-size:14px}
  .note li{margin:5px 0}

  /* dashboard */
  .dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
  .dcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;text-align:center}
  .dcard .n{font-size:30px;font-weight:800;color:var(--accent)}
  .dcard .n.w{color:var(--warm)}
  .dcard .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px}
  .panel h3{font-size:16px;margin-bottom:14px}
  .dayrow{display:flex;align-items:center;gap:12px;margin:10px 0}
  .dayrow .nm{width:120px;font-size:14px;font-weight:600}
  .dayrow .bar{flex:1}
  .dayrow .pc{width:90px;text-align:right;font-size:12px;color:var(--muted)}
  .chart{display:flex;align-items:flex-end;gap:8px;height:180px;padding-top:10px}
  .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;cursor:pointer}
  .col .bx{width:100%;max-width:46px;background:linear-gradient(180deg,var(--accent),var(--accent-2));border-radius:6px 6px 0 0;min-height:3px;transition:height .3s}
  .col.cur .bx{background:linear-gradient(180deg,var(--warm),#f59e0b)}
  .col .v{font-size:10px;color:var(--muted)}
  .col .wk{font-size:11px;color:var(--muted)}
  .col.cur .wk{color:var(--warm);font-weight:700}
  .hint{font-size:12px;color:var(--muted);margin-top:8px}

  /* buttons / toolbars / day actions */
  .btn{cursor:pointer;border:1px solid transparent;background:var(--accent);color:#04201a;font-weight:700;
    padding:9px 14px;border-radius:10px;font-size:13px;transition:.15s}
  .btn:hover{opacity:.92}
  .btn.alt{background:transparent;color:var(--accent-2);border-color:rgba(56,189,248,.4)}
  .btn.alt:hover{border-color:var(--accent-2)}
  .btn.done{background:rgba(34,211,168,.15);color:var(--accent);border-color:var(--accent)}
  .day-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--bg-2);
    border:1px solid var(--line);border-radius:14px;padding:10px 14px;margin-bottom:18px}
  .toolbar .tb-label{font-size:13px;color:var(--muted)}

  /* last-week reference */
  .sets td.setno{width:96px}
  .lastref{font-size:11px;color:var(--accent-2);font-weight:500;margin-top:2px;white-space:nowrap}
  .lastref.none{color:var(--muted);opacity:.6}

  /* consistency tracker */
  .wkdots{display:flex;align-items:center;gap:10px;margin:7px 0}
  .wkdots .wl{width:70px;font-size:12px;color:var(--muted);flex:none}
  .wkdots.cur .wl{color:var(--warm);font-weight:700}
  .dotrow{display:flex;gap:7px;flex-wrap:wrap}
  .pd{width:18px;height:18px;border-radius:50%;border:1px solid var(--line);background:var(--card-2);flex:none}
  .pd.on{background:linear-gradient(135deg,var(--accent),var(--accent-2));border-color:transparent}

  /* rest timer */
  .rest-timer{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(140px);
    background:var(--card);border:1px solid var(--accent);border-radius:16px;padding:12px 16px;
    box-shadow:var(--shadow);z-index:60;display:flex;align-items:center;gap:14px;transition:.3s;min-width:230px}
  .rest-timer.show{transform:translateX(-50%) translateY(0)}
  .rest-timer.ring{animation:ring .5s ease 3}
  @keyframes ring{0%,100%{border-color:var(--accent)}50%{border-color:var(--warm);box-shadow:0 0 0 4px rgba(251,191,36,.25),var(--shadow)}}
  .rest-timer .rt-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .rest-timer .rt-time{font-size:26px;font-weight:800;color:var(--accent);line-height:1}
  .rest-timer.done-t .rt-time{color:var(--warm)}
  .rest-timer .rt-actions{display:flex;gap:8px;margin-left:auto}
  .rest-timer .rt-actions button{cursor:pointer;background:var(--card-2);border:1px solid var(--line);
    color:var(--txt);border-radius:9px;padding:8px 10px;font-size:12px;font-weight:600}
  .rest-timer .rt-actions button:hover{border-color:var(--accent)}

  /* meals tab */
  .tab.meal.active{background:linear-gradient(135deg,rgba(167,139,250,.20),rgba(56,189,248,.12));border-color:#a78bfa}
  .tab.meal.active small{color:#a78bfa}
  .datebar{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px}
  .datebar .dlabel{font-weight:700;font-size:15px;min-width:170px;text-align:center}
  .macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  .mcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
  .mcard .mv{font-size:22px;font-weight:800}
  .mcard .ml{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
  .mcard .mt{font-size:11px;color:var(--muted);margin-top:4px}
  .mcard .mbar{height:6px;border-radius:999px;background:var(--card-2);overflow:hidden;margin-top:8px}
  .mcard .mbar > i{display:block;height:100%;width:0}
  .mcard.kcal .mv{color:var(--accent)} .mcard.kcal .mbar>i{background:var(--accent)}
  .mcard.prot .mv{color:var(--accent-2)} .mcard.prot .mbar>i{background:var(--accent-2)}
  .mcard.carb .mv{color:var(--warm)} .mcard.carb .mbar>i{background:var(--warm)}
  .mcard.fat .mv{color:#f472b6} .mcard.fat .mbar>i{background:#f472b6}
  .mcard.over .mv{color:var(--danger)}

  .additem{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:16px}
  .additem h3{font-size:15px;margin-bottom:12px}
  .quickadd{margin-bottom:12px}
  .quickadd > input{width:100%;background:var(--bg-2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px;font-size:14px}
  .quickadd > input:focus{outline:none;border-color:var(--accent)}
  .food-results{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .foodchip{cursor:pointer;background:var(--card-2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:6px 10px;font-size:12px;text-align:left}
  .foodchip:hover{border-color:var(--accent);color:var(--accent)}
  .divider-or{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;margin:12px 0}
  .divider-or::before,.divider-or::after{content:"";flex:1;height:1px;background:var(--line)}
  .photo-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .ai-status{font-size:12px;color:var(--muted)}
  .ai-status.err{color:var(--danger)} .ai-status.ok{color:var(--accent)}
  .thumb{width:54px;height:54px;border-radius:10px;object-fit:cover;border:1px solid var(--line);flex:none}
  .field-row{display:flex;gap:8px;flex-wrap:wrap}
  .field{display:flex;flex-direction:column;gap:3px}
  .field label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .field input{background:var(--bg-2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px;font-size:14px}
  .field.name{flex:1 1 160px} .field.name input{width:100%}
  .field.num input{width:74px;text-align:center}
  .field input:focus{outline:none;border-color:var(--accent)}

  .mealseg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .mealseg .seg{cursor:pointer;background:var(--card-2);border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:7px 12px;font-size:13px;font-weight:600}
  .mealseg .seg.on{background:linear-gradient(135deg,rgba(34,211,168,.18),rgba(56,189,248,.16));border-color:var(--accent);color:#fff}
  .msection{margin-bottom:6px}
  .mshead{display:flex;align-items:center;gap:8px;margin:16px 0 8px}
  .mshead .mt{font-weight:700;font-size:15px}
  .mshead .msum{margin-left:auto;font-size:13px;color:var(--muted)}
  .mshead .msum b{color:var(--accent)}
  .mealrow{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px}
  .mealrow .mname{font-weight:600;font-size:14px}
  .mealrow .mmac{font-size:12px;color:var(--muted)}
  .mealrow .mkcal{margin-left:auto;font-weight:700;color:var(--accent);white-space:nowrap}
  .mealrow .del{cursor:pointer;background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:6px 9px;font-size:12px}
  .mealrow .del:hover{color:var(--danger);border-color:var(--danger)}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:14px}

  .habit{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:10px 0}
  .habit .hname{width:120px;font-size:14px;font-weight:600}
  .counter{display:flex;align-items:center;gap:8px}

<script>
(function(){
  var s=document.getElementById("splash"); if(!s) return;
  var root=document.documentElement;
  root.classList.add("splash-lock"); document.body && document.body.classList.add("splash-lock");
  var done=false;
  function go(){
    if(done) return; done=true;
    s.classList.add("gone");
    root.classList.remove("splash-lock"); document.body && document.body.classList.remove("splash-lock");
    setTimeout(function(){ s.style.display="none"; }, 520);
    document.removeEventListener("keydown", onKey);
  }
  function onKey(e){ if(e.key==="Enter" || e.key===" "){ e.preventDefault(); go(); } }
  document.addEventListener("keydown", onKey);
  var b=document.getElementById("enterBtn"); if(b) b.addEventListener("click", go);
  s.addEventListener("click", go);
})();
</script>

/* ===== Secure storage (validated, typed) ===== */
const STORE_KEY = "leanfit_progress_v2";
const WEEK_KEY  = "leanfit_week_v2";
const SET_RE = /^w([1-9]|1[0-2])_d[1-5]_e\d{1,2}_[wu]\d{1,2}_(w|r|c)$/;
const MOB_RE = /^w([1-9]|1[0-2])_d[1-5]_m\d{1,2}_c$/;
const FIN_RE = /^w([1-9]|1[0-2])_d[1-5]_fin$/;
const DATE_RE = /^\d{4}-\d{2}-\d{2}$/;

/* Validate one raw {key:value} into clean, applying type/range rules. Shared by load + import. */
function sanitizeInto(clean, k, v){
  if(SET_RE.test(k)){
    if(k.endsWith("_c")){ if(v === true) clean[k] = true; }
    else { const n = Number(v); if(Number.isFinite(n) && n>=0 && n<=9999) clean[k] = n; }
  } else if(MOB_RE.test(k)){
    if(v === true) clean[k] = true;
  } else if(FIN_RE.test(k)){
    if(typeof v === "string" && DATE_RE.test(v)) clean[k] = v;
  }
  // anything else is discarded
}

function loadState(){
  let raw;
  try { raw = JSON.parse(localStorage.getItem(STORE_KEY) || "{}"); }
  catch(e){ return {}; }
  if(typeof raw !== "object" || raw === null || Array.isArray(raw)) return {};
  const clean = {};
  for(const k of Object.keys(raw)) sanitizeInto(clean, k, raw[k]);
  return clean;
}
function loadWeek(){
  const n = parseInt(localStorage.getItem(WEEK_KEY) || "1", 10);
  return (Number.isInteger(n) && n>=1 && n<=MAX_WEEK) ? n : 1;
}
function persist(){
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
    localStorage.setItem(WEEK_KEY, String(currentWeek));
  }catch(e){/* storage full / blocked — ignore */}
  if(window.__cloudPush) window.__cloudPush();
}

let state = loadState();
let currentWeek = loadWeek();
let activeView = "d1";
let activeDay = "d1";

function sid(week, dayKey, ei, type, idx, field){ return "w"+week+"_"+dayKey+"_e"+ei+"_"+type+idx+"_"+field; }
function mid(week, dayKey, mi){ return "w"+week+"_"+dayKey+"_m"+mi+"_c"; }

function setNum(id, v){
  const n = Number(v);
  if(v === "" || !Number.isFinite(n) || n<0){ delete state[id]; }
  else { state[id] = Math.min(9999, n); }
  persist(); toast();
}
function setBool(id, v){
  if(v === true) state[id] = true; else delete state[id];
  persist(); toast();
}

let toastTimer;
function toast(){
  const t = document.getElementById("toast");
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 1000);
}

/* safe text node */
function txt(s){ return document.createTextNode(String(s)); }

/* ===== Helpers for new features ===== */
function todayStr(){ const d=new Date(); const o=d.getTimezoneOffset(); return new Date(d-o*60000).toISOString().slice(0,10); }
function finKey(wk, dayKey){ return "w"+wk+"_"+dayKey+"_fin"; }
function parseRest(rest){ const m=/(\d+)\s*s/.exec(rest||""); return m ? parseInt(m[1],10) : 0; }
function dayByKey(k){ return PROGRAM.find(x=>x.key===k); }

/* Most recent week BEFORE current that logged this exact set */
function lastLogged(dayKey, ei, type, idx){
  for(let w=currentWeek-1; w>=1; w--){
    const wv = state[sid(w,dayKey,ei,type,idx,"w")];
    const rv = state[sid(w,dayKey,ei,type,idx,"r")];
    if(wv!==undefined || rv!==undefined) return {w:wv, r:rv, week:w};
  }
  return null;
}
/* Most recent week BEFORE current that has any data for this whole day */
function findPriorDayWeek(dayKey){
  const d = dayByKey(dayKey);
  for(let w=currentWeek-1; w>=1; w--){
    let has=false;
    d.exercises.forEach((ex,ei)=>{
      for(let s=0;s<(ex.warmupSets||0);s++){ if(state[sid(w,dayKey,ei,"u",s,"w")]!==undefined||state[sid(w,dayKey,ei,"u",s,"r")]!==undefined) has=true; }
      for(let s=0;s<ex.sets;s++){ if(state[sid(w,dayKey,ei,"w",s,"w")]!==undefined||state[sid(w,dayKey,ei,"w",s,"r")]!==undefined) has=true; }
    });
    if(has) return w;
  }
  return 0;
}
function copyLastWeek(dayKey){
  const w = findPriorDayWeek(dayKey);
  if(!w){ alert("No earlier week has logged numbers for this day yet — log it once and you can copy it forward next week."); return; }
  if(!confirm("Copy your weights & reps from Week "+w+" into Week "+currentWeek+"? (This fills the numbers — your 'done' ticks stay as they are.)")) return;
  const d = dayByKey(dayKey);
  d.exercises.forEach((ex,ei)=>{
    const copy=(type,s)=>["w","r"].forEach(f=>{ const src=state[sid(w,dayKey,ei,type,s,f)]; if(src!==undefined) state[sid(currentWeek,dayKey,ei,type,s,f)]=src; });
    for(let s=0;s<(ex.warmupSets||0);s++) copy("u",s);
    for(let s=0;s<ex.sets;s++) copy("w",s);
  });
  persist(); render(); toast();
}
function toggleFinish(dayKey){
  const k = finKey(currentWeek, dayKey);
  if(state[k]!==undefined) delete state[k]; else state[k]=todayStr();
  persist(); render();
}
function totalWorkouts(){ return Object.keys(state).filter(k=>FIN_RE.test(k)).length; }
function weekDaysDone(wk){ return PROGRAM.filter(d=>state[finKey(wk,d.key)]!==undefined).length; }

/* ===== Audio + vibration cue ===== */
let actx=null;
function audioReady(){
  try{
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    if(actx.state==="suspended") actx.resume();
  }catch(e){ actx=null; }
}
function beep(){
  if(!actx) return;
  try{
    const t=actx.currentTime;
    [[880,0],[1175,0.6]].forEach(([f,off])=>{
      const o=actx.createOscillator(), g=actx.createGain();
      o.connect(g); g.connect(actx.destination); o.type="sine"; o.frequency.value=f;
      g.gain.setValueAtTime(0.0001, t+off);
      g.gain.exponentialRampToValueAtTime(0.35, t+off+0.03);
      g.gain.exponentialRampToValueAtTime(0.0001, t+off+0.5);
      o.start(t+off); o.stop(t+off+0.52);
    });
  }catch(e){}
}

/* ===== Rest timer ===== */
let restInt=null, restEnd=0;
function startRest(sec){
  if(!sec || sec<=0) return;
  audioReady();
  restEnd = Date.now() + sec*1000;
  const el=document.getElementById("restTimer");
  el.classList.add("show"); el.classList.remove("done-t","ring");
  document.getElementById("restLabel").textContent = "Rest";
  if(restInt) clearInterval(restInt);
  restInt = setInterval(tickRest, 200);
  tickRest();
}
function tickRest(){
  const leftMs = restEnd - Date.now();
  const left = Math.max(0, Math.ceil(leftMs/1000));
  const m=Math.floor(left/60), s=left%60;
  document.getElementById("restTime").textContent = m+":"+(s<10?"0":"")+s;
  if(leftMs<=0){
    clearInterval(restInt); restInt=null;
    const el=document.getElementById("restTimer");
    el.classList.add("done-t","ring");
    document.getElementById("restLabel").textContent = "Go! Next set 💪";
    beep();
    if(navigator.vibrate) navigator.vibrate([220,120,220]);
    setTimeout(()=>{ el.classList.remove("show","ring","done-t"); }, 4000);
  }
}
function stopRest(){
  if(restInt){ clearInterval(restInt); restInt=null; }
  document.getElementById("restTimer").classList.remove("show","ring","done-t");
}

/* ===== Import sanitizers for meals / body / targets ===== */
function sanitizeMeals(raw){
  const out={};
  if(!raw || typeof raw!=="object") return out;
  Object.keys(raw).forEach(d=>{
    if(!DATE_RE.test(d)) return;
    const day=raw[d]; if(!day || typeof day!=="object") return;
    const items=Array.isArray(day.items)? day.items.slice(0,200).map(it=>{
      if(!it || typeof it!=="object") return null;
      const o={ id:(typeof it.id==="string"?it.id:uid()), meal:(MEAL_KEYS.indexOf(it.meal)>=0?it.meal:"snack"),
                name:(typeof it.name==="string"? it.name.slice(0,80):"Food"),
                kcal:num(it.kcal), protein:num(it.protein), carbs:num(it.carbs), fat:num(it.fat) };
      if(typeof it.thumb==="string" && it.thumb.startsWith("data:image/") && it.thumb.length<200000) o.thumb=it.thumb;
      return o;
    }).filter(Boolean) : [];
    out[d]={ items:items, water:num(day.water), steps:num(day.steps) };
  });
  return out;
}
function sanitizeBody(raw){
  const out={};
  if(!raw || typeof raw!=="object") return out;
  Object.keys(raw).forEach(d=>{
    if(!DATE_RE.test(d)) return;
    const e=raw[d]; if(!e || typeof e!=="object") return;
    const o={}; if(num(e.weight)>0) o.weight=num(e.weight); if(num(e.waist)>0) o.waist=num(e.waist);
    if(Object.keys(o).length) out[d]=o;
  });
  return out;
}
function sanitizeTargets(raw){
  if(!raw || typeof raw!=="object") return null;
  return { kcal:num(raw.kcal)||1800, protein:num(raw.protein)||110 };
}

/* ===== Export / Import backup ===== */
function exportData(){
  const payload = { app:"LeanFit5", schema:"v3", week:currentWeek, exportedAt:new Date().toISOString(),
                    data:state, meals:meals, body:body, targets:targets };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "leanfit-backup-"+todayStr()+".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
  toast();
}
function importData(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    let parsed;
    try { parsed = JSON.parse(reader.result); }
    catch(e){ alert("That file isn't valid backup data."); return; }
    const raw = (parsed && typeof parsed==="object" && parsed.data && typeof parsed.data==="object") ? parsed.data : parsed;
    if(!raw || typeof raw!=="object"){ alert("Couldn't read any progress from that file."); return; }
    const clean = {};
    Object.keys(raw).forEach(k=> sanitizeInto(clean, k, raw[k]));

    const cleanMeals = sanitizeMeals(parsed && parsed.meals);
    const cleanBody  = sanitizeBody(parsed && parsed.body);
    const cleanTargets = sanitizeTargets(parsed && parsed.targets);

    const hasAnything = Object.keys(clean).length>0 || Object.keys(cleanMeals).length>0 || Object.keys(cleanBody).length>0;
    if(!hasAnything){ alert("No valid LeanFit data found in that file."); return; }
    if(!confirm("Import this backup? It will REPLACE the workout, meal and body data currently on this device.")) return;
    state = clean;
    meals = cleanMeals; saveJSON(MEALS_KEY, meals);
    body = cleanBody; saveJSON(BODY_KEY, body);
    if(cleanTargets){ targets = cleanTargets; saveJSON(TARGETS_KEY, targets); }
    if(parsed && Number.isInteger(parsed.week) && parsed.week>=1 && parsed.week<=MAX_WEEK) currentWeek = parsed.week;
    persist(); render(); toast();
  };
  reader.readAsText(file);
}

function buildDayPills(){
  const SHORT = { d1:"Push", d2:"Pull", d3:"Legs", d4:"Upper Body", d5:"Lower + Core" };

function buildNav(){
  const section = activeView.startsWith("d") ? "train" : activeView;
  document.querySelectorAll("#nav button").forEach(b=>{
    b.classList.toggle("active", b.dataset.sec===section);
  });
  document.getElementById("trainControls").style.display = (section==="train") ? "block" : "none";

/* ===== Build a set row ===== */
function setRow(dayKey, ei, type, idx, phWeight, restSeconds){
  const tr = document.createElement("tr");
  tr.className = (type==="u" ? "warmup" : "work");
  const wId = sid(currentWeek, dayKey, ei, type, idx, "w");
  const rId = sid(currentWeek, dayKey, ei, type, idx, "r");
  const cId = sid(currentWeek, dayKey, ei, type, idx, "c");
  const checked = state[cId] === true;
  if(checked) tr.classList.add("done-row");

  const tdNo = document.createElement("td");
  tdNo.className = "setno";
  const lab = document.createElement("div");
  lab.textContent = (type==="u" ? "Warm-up "+(idx+1) : "Set "+(idx+1));
  tdNo.appendChild(lab);
  const prev = lastLogged(dayKey, ei, type, idx);
  const lr = document.createElement("div"); lr.className = "lastref" + (prev?"":" none");
  if(prev){
    const wTxt = (prev.w!==undefined? prev.w : "–");
    const rTxt = (prev.r!==undefined? prev.r : "–");
    lr.textContent = "last: "+wTxt+"×"+rTxt;
    lr.title = "Week "+prev.week+": "+wTxt+" kg × "+rTxt+" reps — beat it!";
  } else { lr.textContent = "last: —"; }
  tdNo.appendChild(lr);

  const mkNum = (id, ph, isWeight)=>{
    const td = document.createElement("td");
    const inp = document.createElement("input");
    inp.type="number"; inp.min="0"; inp.max="9999"; inp.inputMode="decimal"; inp.placeholder=ph; inp.title=ph; inp_set(inp,id);
    inp.addEventListener("change", ()=>{
      let prevBest = 0;
      if(isWeight && type==="w") prevBest = bestForLift(dayKey, ei, id);
      setNum(id, inp.value);
      refreshExerciseBar(tr.closest("[data-ex]"));
      if(isWeight && type==="w"){
        const v = Number(inp.value)||0;
        const d = dayByKey(dayKey);
        if(v>0 && v>prevBest && prevBest>0){ celebratePR(d.exercises[ei].name, v); }
      }
    });
    td.appendChild(inp); return td;
  };
  function inp_set(inp,id){ const v = state[id]; inp.value = (v===undefined ? "" : v); }

  const tdC = document.createElement("td");
  tdC.style.textAlign="center";
  const cb = document.createElement("input");
  cb.type="checkbox"; cb.checked = checked;
  cb.addEventListener("change", ()=>{
    setBool(cId, cb.checked);
    tr.classList.toggle("done-row", cb.checked);
    refreshExerciseBar(tr.closest("[data-ex]"));
    if(cb.checked) startRest(restSeconds); else stopRest();
  });
  tdC.appendChild(cb);

  const wPh = (type==="u" ? "~light" : (phWeight || "kg"));
  tr.append(tdNo, mkNum(wId, wPh, true), mkNum(rId,"reps", false), tdC);
  return tr;
}

/* ===== Build day view ===== */
function buildDay(d){

  const head = document.createElement("div"); head.className="day-head";

  /* day actions: copy last week + finish workout */
  const actions = document.createElement("div"); actions.className="day-actions";

  wh.append(wht, wlink);
  const wi = document.createElement("p"); wi.className="intro"; wi.textContent = d.warmup.intro;

    const dd = document.createElement("div"); dd.className="dd"; dd.textContent = dr.d;
    wrap.append(nm, dd);
    row.append(cb, wrap);
    wb.appendChild(row);
  });
  root.appendChild(wb);

  /* exercises */
  d.exercises.forEach((ex, ei)=>{
    const card = document.createElement("div"); card.className="ex"; card.dataset.ex="1";

    const top = document.createElement("div"); top.className="ex-top";
    const left = document.createElement("div");
    const nm = document.createElement("div"); nm.className="ex-name"; nm.textContent = (ei+1)+". "+ex.name;
    const meta = document.createElement("div"); meta.className="ex-meta";
    const chip = (label,val,cls)=>{ const c=document.createElement("span"); c.className="chip"+(cls?" "+cls:""); c.append(txt(label+" ")); const b=document.createElement("b"); b.textContent=val; c.appendChild(b); return c; };
    const sug = SUGGEST[ex.name] || "";
    meta.appendChild(chip("🎯", ex.target));
    if(ex.warmupSets>0) meta.appendChild(chip("Warm-up sets", String(ex.warmupSets), "warm"));
    meta.appendChild(chip("Work sets", String(ex.sets)));
    meta.appendChild(chip("Reps", ex.reps));
    meta.appendChild(chip("Rest", ex.rest));
    if(sug) meta.appendChild(chip("🏋 Start", sug, "sug"));
    left.append(nm, meta);

    const vlink = document.createElement("a"); vlink.className="vid"; vlink.href = ex.vid;
    vlink.target="_blank"; vlink.rel="noopener noreferrer"; vlink.textContent = "▶ Form Video";
    top.append(left, vlink);

    const cue = document.createElement("div"); cue.className="cue"; cue.textContent = "💡 "+ex.cue;

    const setsWrap = document.createElement("div"); setsWrap.className="sets";
    const table = document.createElement("table");
    const thead = document.createElement("thead");
    const isTimed = /min|s |on\b|leg|total|each|s$/.test(ex.reps);
    thead.innerHTML = "<tr><th></th><th>Weight</th><th>"+(isTimed?"Reps / Time":"Reps")+"</th><th style='text-align:center'>Done</th></tr>";
    const tbody = document.createElement("tbody");
    const restSec = parseRest(ex.rest);
    for(let s=0;s<(ex.warmupSets||0);s++) tbody.appendChild(setRow(d.key, ei, "u", s, sug, restSec));
    for(let s=0;s<ex.sets;s++)            tbody.appendChild(setRow(d.key, ei, "w", s, sug, restSec));
    table.append(thead, tbody);

    const pw = document.createElement("div"); pw.className="progress-wrap";
    const bar = document.createElement("div"); bar.className="bar"; const fill=document.createElement("i"); fill.dataset.bar="1"; bar.appendChild(fill);
    const lbl = document.createElement("div"); lbl.className="progress-label";
    const lblL = document.createElement("span"); lblL.dataset.label="1";
    const lblR = document.createElement("span"); lblR.dataset.vol="1";
    lbl.append(lblL, lblR);
    pw.append(bar, lbl);

    setsWrap.append(table, pw);
    card.append(top, cue, setsWrap);

/* ===== Progress dashboard ===== */
function computeWeek(wk){
  let volume=0, done=0, total=0; const perDay=[];
  PROGRAM.forEach(d=>{
    let dDone=0,dTotal=0,dVol=0;
    d.exercises.forEach((ex,ei)=>{
      for(let s=0;s<(ex.warmupSets||0);s++){ dTotal++; if(state[sid(wk,d.key,ei,"u",s,"c")]===true) dDone++; }
      for(let s=0;s<ex.sets;s++){
        dTotal++;
        if(state[sid(wk,d.key,ei,"w",s,"c")]===true) dDone++;
        const w=Number(state[sid(wk,d.key,ei,"w",s,"w")]||0);
        const r=Number(state[sid(wk,d.key,ei,"w",s,"r")]||0);
        if(w>0&&r>0) dVol += w*r;
      }
    });
    perDay.push({title:d.title, day:d.day, done:dDone, total:dTotal, vol:dVol});
    done+=dDone; total+=dTotal; volume+=dVol;
  });
  return {volume, done, total, perDay};
}

/* ---- Image resize to data URL (keeps storage small, no blob: needed) ---- */
function resizeImage(file, maxDim, quality){
  return new Promise((resolve,reject)=>{
    const fr=new FileReader();
    fr.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const scale=Math.min(1, maxDim/Math.max(img.width,img.height));
        const w=Math.max(1,Math.round(img.width*scale)), h=Math.max(1,Math.round(img.height*scale));
        const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        try{ resolve(cv.toDataURL("image/jpeg", quality)); }catch(e){ reject(e); }
      };
      img.onerror=()=>reject(new Error("image"));
      img.src=fr.result;
    };
    fr.onerror=()=>reject(new Error("file"));
    fr.readAsDataURL(file);
  });
}

const FOOD_PROMPT="Estimate the food in this photo. Reply with ONLY compact JSON and nothing else: {\"name\":string,\"kcal\":number,\"protein\":number,\"carbs\":number,\"fat\":number}. Macros in grams; numbers are totals for the visible portion.";
function parseEst(content){
  if(!content) return null;
  content=String(content).replace(/```json|```/g,"").trim();
  const m=content.match(/\{[\s\S]*\}/); if(m) content=m[0];
  try{ return JSON.parse(content); }catch(e){ return null; }
}
async function callOpenAI(key, big){
  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
    body:JSON.stringify({ model:"gpt-4o-mini", max_tokens:200, temperature:0.2,
      messages:[{role:"user",content:[{type:"text",text:FOOD_PROMPT},{type:"image_url",image_url:{url:big}}]}] })
  });
  if(!res.ok){
    if(res.status===401) throw new Error("Invalid OpenAI key — check it in settings.");
    if(res.status===429) throw new Error("OpenAI: rate limit / no credit on your account. (Tip: use a free Gemini key instead — see settings.)");
    throw new Error("OpenAI API error "+res.status+".");
  }
  const j=await res.json();
  const est=parseEst(j.choices && j.choices[0] && j.choices[0].message && j.choices[0].message.content);
  if(!est) throw new Error("AI replied in an unexpected format — enter values manually.");
  return est;
}
async function callGemini(key, big){
  const b64=(big.split(",")[1])||"";
  const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent",{
    method:"POST", headers:{"Content-Type":"application/json","x-goog-api-key":key},
    body:JSON.stringify({ contents:[{parts:[{text:FOOD_PROMPT},{inline_data:{mime_type:"image/jpeg",data:b64}}]}], generationConfig:{temperature:0.2} })
  });
  if(!res.ok){
    if(res.status===400||res.status===403) throw new Error("Gemini rejected the key — make sure it's a valid AI Studio key and the Generative Language API is enabled.");
    if(res.status===429) throw new Error("Gemini: free-tier limit reached — wait a minute and retry.");
    throw new Error("Gemini API error "+res.status+".");
  }
  const j=await res.json();
  let content="";
  try{ content=j.candidates[0].content.parts.map(p=>p.text||"").join(""); }catch(e){ content=""; }
  const est=parseEst(content);
  if(!est) throw new Error("AI replied in an unexpected format — enter values manually.");
  return est;
}

function buildBodyPanel(){
  const p=document.createElement("div"); p.className="panel";
  const h=document.createElement("h3"); h.textContent="⚖️ Bodyweight & waist tracker"; p.appendChild(h);

  const form=document.createElement("div"); form.className="bodyform";

  const today=todayStr();
  const existing=body[today]||{};
  const wF=mkF("Weight (kg)","e.g. 68", "bwWeight"); if(existing.weight) wF.i.value=existing.weight;
  const waF=mkF("Waist (cm)","e.g. 80", "bwWaist"); if(existing.waist) waF.i.value=existing.waist;
  const save=document.createElement("button"); save.type="button"; save.className="btn"; save.textContent="Save today";
  save.addEventListener("click",()=>{
    const w=num(wF.i.value), wa=num(waF.i.value);
    if(w===0 && wa===0){ alert("Enter a weight or waist measurement first."); return; }
    body[today]={}; if(w) body[today].weight=w; if(wa) body[today].waist=wa;
    saveJSON(BODY_KEY,body); render(); toast();
  });
  form.append(wF.f, waF.f, save);
  p.appendChild(form);

  const dates=Object.keys(body).filter(d=>body[d] && body[d].weight!==undefined).sort();
  if(dates.length===0){
    const e=document.createElement("div"); e.className="hint"; e.textContent="Log your weight weekly to see the trend line build here.";
    p.appendChild(e);
  } else {
    const series=dates.slice(-12);
    const vals=series.map(d=>body[d].weight);
    const mn=Math.min(...vals), mx=Math.max(...vals); const range=Math.max(1, mx-mn);
    const spark=document.createElement("div"); spark.className="spark";
    series.forEach(d=>{
      const sc=document.createElement("div"); sc.className="sc";
      const v=document.createElement("div"); v.className="sv"; v.textContent=body[d].weight;
      const b=document.createElement("div"); b.className="sb"; b.style.height=(18+Math.round((body[d].weight-mn)/range*86))+"px";
      const dd=document.createElement("div"); dd.className="sd"; dd.textContent=fmtDate(d).replace(/^\w+,?\s*/,"");
      sc.append(v,b,dd); spark.appendChild(sc);
    });
    p.appendChild(spark);
    const first=vals[0], last=vals[vals.length-1]; const diff=Math.round((last-first)*10)/10;
    const summary=document.createElement("div"); summary.className="hint";
    summary.textContent = diff===0 ? "Holding steady at "+last+" kg." : (diff<0? ("Down "+Math.abs(diff)+" kg since you started logging — great work!") : ("Up "+diff+" kg since you started logging."));
    p.appendChild(summary);
  }
  return p;
}

/* ===== Return-to-training phase (you've had a 2-year break) ===== */
function phaseInfo(week){
  if(week<=2) return {
    icon:"🌱", color:"#22d3a8", name:"Ease-In Phase",
    detail:"Coming back after 2 years off — go easy. Do only <b>2 working sets</b> per exercise (skip the 3rd), use the <b>lighter end</b> of each suggested weight, and stop <b>4–5 reps before failure</b>. Expect some soreness — that's normal. Goal this phase: relearn form & build the habit. Keep the cardio finisher <b>easy</b> (walk, don't sprint)."
  };
  if(week<=4) return {
    icon:"🔧", color:"#38bdf8", name:"Build-Up Phase",
    detail:"Body is adapting. Add back the <b>3rd working set</b>. Take working sets to about <b>2–3 reps from failure</b>. Start nudging the weight up slightly when a lift feels easy. You can begin the HIIT finisher at a moderate effort."
  };
  if(week<=8) return {
    icon:"🔥", color:"#fbbf24", name:"Progression Phase",
    detail:"Full program now. Push your last <b>1–2 reps</b> hard with good form, and apply <b>progressive overload</b> — add a little weight or a rep most weeks. This is where lean muscle and fat loss really show."
  };
  return {
    icon:"🏆", color:"#a78bfa", name:"Peak & Reassess Phase",
    detail:"Keep progressing. If you feel run-down, take a <b>lighter deload week</b> (half the sets), then come back stronger. Retest your starting weights and set new targets for your next 12-week block."
  };
}
function renderPhase(){

  const box = document.createElement("div"); box.className="phase"; box.style.borderLeftColor = p.color;

  h.style.color = p.color;

  const wk = document.createElement("span"); wk.className="wk"; wk.textContent = "· Week "+currentWeek;
  h.appendChild(wk);
  const txtP = document.createElement("p"); txtP.innerHTML = p.detail;
  body.append(h, txtP);
  box.append(ic, body);
  host.appendChild(box);
}

window.__getSnapshot = function(){

window.__applySnapshot = function(d, replace){
  if(!d || typeof d!=="object") return;
  var cs={}; if(d.state && typeof d.state==="object"){ Object.keys(d.state).forEach(function(k){ sanitizeInto(cs,k,d.state[k]); }); }
  state = replace ? cs : Object.assign({}, state, cs); persist();
  var cm = (d.meals && typeof d.meals==="object") ? sanitizeMeals(d.meals) : {};
  meals = replace ? cm : Object.assign({}, meals, cm); saveJSON(MEALS_KEY, meals);
  var cb = (d.body && typeof d.body==="object") ? sanitizeBody(d.body) : {};
  body = replace ? cb : Object.assign({}, body, cb); saveJSON(BODY_KEY, body);
  if(d.targets){ var t=sanitizeTargets(d.targets); if(t){ targets=t; saveJSON(TARGETS_KEY, targets); } }
  if(typeof d.aikey==="string" && d.aikey){ try{ localStorage.setItem(APIKEY_KEY, d.aikey); }catch(e){} }
  render();
};

  clearTimeout(pushTimer);
  pushTimer = setTimeout(async function(){
    try { await setDoc(doc(db,"users",uid), window.__getSnapshot()); setStatus("Synced ✓ "+new Date().toLocaleTimeString()); }
    catch(e){ setStatus(errText(e)); }
  }, 1200);
};

onAuthStateChanged(auth, async function(user){
  if(unsub){ unsub(); unsub=null; }
  if(!user){ uid=null; window.__cloudUser=null; setStatus("Not signed in"); return; }
  uid = user.uid; window.__cloudUser = user.email || "signed in"; setStatus("Syncing…");
  try {
    const ref = doc(db,"users",uid);
    const ds = await getDoc(ref);
    if(ds.exists()){
      window.__applyingRemote=true;
      try { window.__applySnapshot(ds.data(), false); } finally { window.__applyingRemote=false; }
    }
    await setDoc(ref, window.__getSnapshot());           // push merged snapshot up
    setStatus("Synced as "+(user.email||"you")+" ✓");
    unsub = onSnapshot(ref, function(snap){
      if(snap.metadata.hasPendingWrites || !snap.exists()) return;   // ignore our own writes
      window.__applyingRemote=true;
      try { window.__applySnapshot(snap.data(), true); } finally { window.__applyingRemote=false; }
      setStatus("Synced ✓ "+new Date().toLocaleTimeString());
    }, function(err){ setStatus(errText(err)); });
  } catch(e){ setStatus(errText(e)); }
});
</script>
